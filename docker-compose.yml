version: "3.9"

services:
  python:
    build:
      context: .
      dockerfile: python/Dockerfile
    ports:
      - "50051:50051"
      - "5000:5000"
    volumes:
      - ./python:/app
      - ./proto:/app/proto
    networks:
      - grpc-net

  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./node:/app
      - ./proto:/app/proto
      - node_modules:/app/node_modules
    depends_on:
      - python
    networks:
      - grpc-net

networks:
  grpc-net:

volumes:
  node_modules: