<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Analyzer • gRPC Demo</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <img class="logo" src="/logo.svg" alt="Exadel AI logo" />
        <div>
          <h1>Number Analyzer: gRPC Demo</h1>
        </div>
      </div>
      <nav>
        <a class="active" href="/">Demo</a>
        <a href="/benchmark.html">Benchmark</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <p>Enter a number and analyze it with a simple gRPC-backed API. You can also stream factor results in real time.</p>
      </div>
    </section>

    <section class="card">
      <div class="controls">
        <input id="number" type="number" placeholder="Enter a number" />
        <button onclick="analyze()">Analyze</button>
        <button onclick="stream()">Stream</button>
      </div>
      <div class="result-panel" id="result">Results will appear here.</div>
    </section>

    <footer class="footer">
      <div>Demo page powered by Express + gRPC.</div>
      <div>Try the benchmark page to compare REST and gRPC performance.</div>
    </footer>
  </div>

  <script>
    async function analyze() {
      const num = document.getElementById("number").value;
      if (!num) {
        document.getElementById("result").innerText = "Please enter a number first.";
        return;
      }

      const res = await fetch(`/api/analyze/${num}`);
      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data, null, 2);
    }

    async function stream() {
      const num = document.getElementById("number").value;
      const resultEl = document.getElementById("result");

      if (!num) {
        resultEl.innerText = "Please enter a number first.";
        return;
      }

      resultEl.innerHTML = "<strong>Streaming factors:</strong> ";
      const res = await fetch(`/api/stream/${num}`);
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      function createFactorChip(value) {
        const chip = document.createElement("span");
        chip.textContent = value;
        chip.className = "stream-chip";
        resultEl.appendChild(chip);
      }

      async function appendFactor(value) {
        createFactorChip(value);
        await new Promise((resolve) => setTimeout(resolve, 30));
      }

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n");
        buffer = parts.pop();

        for (const part of parts) {
          const trimmed = part.trim();
          if (trimmed) {
            await appendFactor(trimmed);
          }
        }
      }

      const finalValue = decoder.decode();
      if (finalValue) {
        buffer += finalValue;
      }

      if (buffer.trim()) {
        await appendFactor(buffer.trim());
      }
    }
  </script>
</body>
</html>
